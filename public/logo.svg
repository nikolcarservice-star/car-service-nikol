<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none" role="img" aria-label="Car Service Nikol">
  <defs>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="piston" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2" />
    </filter>
  </defs>
  <!-- Hexagon outer -->
  <path
    d="M100 12 L178 62 L178 148 L100 208 L22 148 L22 62 Z"
    stroke="#64748b"
    stroke-width="2.5"
    fill="none"
  />
  <!-- Hexagon inner -->
  <path
    d="M100 22 L168 64 L168 146 L100 198 L32 146 L32 64 Z"
    stroke="#475569"
    stroke-width="1"
    fill="none"
    opacity="0.7"
  />
  <!-- Ribbon -->
  <path
    d="M8 95 L50 95 L58 108 L100 95 L142 108 L150 95 L192 95 L185 108 L100 125 L15 108 Z"
    fill="url(#ribbon)"
    stroke="#334155"
    stroke-width="1"
    filter="url(#shadow)"
  />
  <!-- Star above pistons -->
  <path
    d="M100 52 L102 60 L110 60 L104 65 L106 73 L100 69 L94 73 L96 65 L90 60 L98 60 Z"
    fill="#f97316"
  />
  <!-- Crossed pistons -->
  <g fill="url(#piston)" stroke="#475569" stroke-width="1.2" stroke-linejoin="round">
    <path d="M58 72 L78 92 L92 78 L72 58 Z" />
    <ellipse cx="75" cy="75" rx="20" ry="9" transform="rotate(-45 75 75)" />
    <path d="M142 72 L122 92 L108 78 L128 58 Z" />
    <ellipse cx="125" cy="75" rx="20" ry="9" transform="rotate(45 125 75)" />
  </g>
  <!-- ESTD -->
  <text x="52" y="92" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">ESTD</text>
  <!-- 2024 -->
  <text x="148" y="92" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">2024</text>
  <!-- CAR SERVICE NIKOL on ribbon -->
  <text x="100" y="102" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="0.08em">CAR SERVICE NIKOL</text>
  <!-- SERWIS SAMOCHODOWY -->
  <text x="100" y="168" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="0.06em">SERWIS SAMOCHODOWY</text>
  <!-- Small X at bottom -->
  <path d="M97 198 L100 202 L103 198 M100 198 L100 202" stroke="#64748b" stroke-width="1" stroke-linecap="round" opacity="0.7" />
</svg>
