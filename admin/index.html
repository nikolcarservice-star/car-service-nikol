<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Service Nikol — CRM</title>
  <meta name="theme-color" content="#1A1D21">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' },
            crm: {
              bg: '#1A1D21',
              surface: '#24292E',
              surfaceHover: '#2d333b',
              accent: '#F97316',
              text: '#E2E8F0',
              textMuted: '#94A3B8',
              border: 'rgba(255,255,255,0.08)',
              glass: 'rgba(36,41,46,0.85)'

          },
          borderRadius: { crm: '10px', 'crm-lg': '14px' },
          boxShadow: {
            'crm-card': '0 4px 24px -4px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.04)',
            'crm-btn': '0 2px 8px -2px rgba(249,115,22,0.35)'
          }
        }
      },
      darkMode: 'class'
